<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color:cornsilk;">
    <div style="display:flex; justify-content: center;">
        <h1 id="h-1">Sekarang waktu apa?</h1>
    </div>
    <div style="display:grid; justify-content: center;">
        <h3 id="waktu"></h3>
        <button onclick="check()" style="height: 25px; width: 70px; font-weight: bold; 
        background-color: aquamarine;">Check</button>
    </div>
</body>
<script src="praktikum-8.js"></script>
<script>setInterval(()=> {
    date = new Date();
    exact = date.getHours() + ":" + date.getMinutes() + ":" + date.getSeconds();
    document.getElementById("waktu").innerText = exact;
}, 1000);
</script>
</html>
